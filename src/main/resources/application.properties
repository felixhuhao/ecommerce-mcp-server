spring.application.name=ecommerce-mcp-server
spring.config.import=optional:file:.env.properties

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.ai.mcp.server.name=ecommerce-mcp-server
spring.ai.mcp.server.version=0.0.1
# TrustedActorContext is verified for the synchronous streamable HTTP transport; re-test identity propagation before changing transport.
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

app.auth.service-token=${APP_SERVICE_TOKEN:}
